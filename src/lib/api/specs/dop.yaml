    "200":
      description: OK
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                $ref: "#/components/schemas/ErrorCode"
              message:
                type: string
            required:
              - code
              - message
